<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tether-ddns — Flat Instrument Panel (mockup)</title>
<style>
/* ============================================================
   FLAT INSTRUMENT PANEL — design tokens
   Redesign of tether-ddns. Sharper, flatter, hairline-driven.
   - Radius floor: 2px controls, 0 on full-bleed surfaces
   - No shadows anywhere; separation via 1px hairlines + bg layers
   - Silent-until-state semantic color, one blue accent
   - Monospace reserved for literal network values
   ============================================================ */
:root {
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: "SF Mono", ui-monospace, "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;

  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-soft: rgba(59,130,246,.13);

  --ok: #10b981;   --ok-soft: rgba(16,185,129,.14);
  --warn: #f59e0b; --warn-soft: rgba(245,158,11,.15);
  --err: #ef4444;  --err-soft: rgba(239,68,68,.14);
  --muted-status: #64748b; --muted-soft: rgba(100,116,139,.14);
  --indigo: #6366f1;

  --r: 2px;            /* control/card radius — near-flat */
  --r-0: 0px;          /* full-bleed surfaces */
  --tr: .14s cubic-bezier(.4,0,.2,1);

  --z-rail: 30; --z-sticky: 40; --z-backdrop: 90; --z-modal: 100; --z-toast: 200;
}

/* Dark — cool graphite, higher contrast, no navy softness */
[data-theme="dark"] {
  --bg: #0a0c10;
  --bg-2: #0e1116;
  --surface: #12151c;
  --surface-2: #171b23;
  --border: #242a35;
  --border-strong: #333b49;
  --grid: #1b202a;
  --text: #eef1f6;
  --text-2: #9aa3b2;
  --text-3: #626c7d;
  --rail-bg: #0b0e13;
  --overlay: rgba(4,6,10,.62);
}
/* Light — crisp paper, true-gray hairlines */
[data-theme="light"] {
  --bg: #f2f4f8;
  --bg-2: #e9ecf2;
  --surface: #ffffff;
  --surface-2: #f5f7fa;
  --border: #dde1e9;
  --border-strong: #c6ccd8;
  --grid: #e7eaf0;
  --text: #0d1420;
  --text-2: #4d566b;
  --text-3: #828b9d;
  --rail-bg: #eef1f6;
  --overlay: rgba(20,28,44,.34);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  transition: background var(--tr), color var(--tr);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; font-size: inherit; }
h1,h2,h3,h4 { color: var(--text); font-weight: 700; }
::selection { background: var(--accent-soft); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border: 3px solid var(--bg); }
::-webkit-scrollbar-track { background: transparent; }

/* ============================================================ SHELL */
.shell { display: grid; grid-template-columns: var(--rail-w, 236px) 1fr; min-height: 100vh; }

/* ---------- Rail ---------- */
.rail {
  position: sticky; top: 0; align-self: start; height: 100vh;
  background: var(--rail-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 16px 12px; gap: 4px;
  z-index: var(--z-rail);
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 16px; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
.logo {
  width: 34px; height: 34px; border-radius: var(--r);
  background: var(--accent); display: grid; place-items: center; color: #fff; flex: none;
}
.logo svg { width: 19px; height: 19px; }
.brand-text h1 { font-size: 15px; letter-spacing: -.2px; line-height: 1.1; }
.brand-text p { font-size: 11px; color: var(--text-3); font-weight: 500; margin-top: 2px; font-family: var(--mono); }

.nav { display: flex; flex-direction: column; gap: 1px; margin-top: 4px; }
.nav-sec { font-size: 10.5px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--text-3); padding: 12px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 10px; border-radius: var(--r);
  color: var(--text-2); font-size: 13.5px; font-weight: 550;
  transition: var(--tr); width: 100%; text-align: left;
  border-left: 2px solid transparent;
}
.nav-item svg { width: 17px; height: 17px; flex: none; }
.nav-item:hover { color: var(--text); background: var(--surface); }
.nav-item.active { color: var(--text); background: var(--surface); border-left-color: var(--accent); }
.nav-item.active svg { color: var(--accent); }
.nav-count {
  margin-left: auto; font-size: 11px; font-weight: 700; font-family: var(--mono);
  color: var(--text-3); min-width: 20px; text-align: right;
}
.nav-item.active .nav-count { color: var(--accent); }

.rail-foot { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
.rail-status { display: flex; align-items: center; gap: 9px; padding: 8px 10px; font-size: 12px; color: var(--text-2); font-family: var(--mono); }
.rail-status .dot { width: 7px; height: 7px; background: var(--ok); flex: none; }
.rail-status.offline .dot { background: var(--err); }

/* ---------- Content ---------- */
.content { min-width: 0; display: flex; flex-direction: column; }

header.topbar {
  position: sticky; top: 0; z-index: var(--z-sticky);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.topbar-inner { display: flex; align-items: center; gap: 14px; padding: 12px 26px; }
.rail-toggle { display: grid; }
.page-title h2 { font-size: 16px; letter-spacing: -.2px; line-height: 1.15; }
.page-title p { font-size: 12px; color: var(--text-3); margin-top: 1px; }
.spacer, .topbar-spacer { flex: 1; }

.ip-pill {
  display: flex; align-items: stretch; border: 1px solid var(--border); border-radius: var(--r);
  font-size: 12.5px; overflow: hidden;
}
.ip-pill .seg { display: flex; align-items: center; gap: 7px; padding: 6px 11px; }
.ip-pill .seg + .seg { border-left: 1px solid var(--border); }
.ip-pill .dot { width: 7px; height: 7px; background: var(--ok); flex: none; }
.ip-pill.offline .dot { background: var(--err); }
.ip-pill .k { color: var(--text-3); font-weight: 600; font-size: 11px; }
.ip-pill .v { font-family: var(--mono); font-weight: 600; letter-spacing: -.2px; }
.ip-pill .status-seg { display: none; }

.icon-btn {
  width: 36px; height: 36px; border-radius: var(--r);
  display: grid; place-items: center;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-2); transition: var(--tr); flex: none;
}
.icon-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
.icon-btn svg { width: 17px; height: 17px; }
.icon-btn.spin svg { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.main { padding: 24px 26px 40px; max-width: 1240px; width: 100%; }

/* ============================================================ BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 8px 14px; border-radius: var(--r); font-size: 13px; font-weight: 600;
  border: 1px solid transparent; transition: var(--tr); white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-ghost { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-ghost:hover { border-color: var(--border-strong); background: var(--surface-2); }
.btn-danger { background: var(--err-soft); color: var(--err); }
.btn-danger:hover { background: var(--err); color: #fff; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ============================================================ SECTION HEAD */
.section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.section-head h3 { font-size: 18px; letter-spacing: -.3px; }
.count-badge {
  font-family: var(--mono); font-size: 11.5px; font-weight: 600; color: var(--text-2);
  padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--r);
}

/* ============================================================ STATS */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 22px; }
.stat { background: var(--surface); padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; transition: background var(--tr); }
.stat:hover { background: var(--surface-2); }
.stat-top { display: flex; align-items: center; justify-content: space-between; }
.stat-label { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text-3); }
.stat-ico { width: 30px; height: 30px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: var(--r); color: var(--text-2); }
.stat-ico svg { width: 16px; height: 16px; }
.stat-ico.tint-ok { color: var(--ok); border-color: var(--ok-soft); background: var(--ok-soft); }
.stat-ico.tint-warn { color: var(--warn); border-color: var(--warn-soft); background: var(--warn-soft); }
.stat-ico.tint-accent { color: var(--accent); border-color: var(--accent-soft); background: var(--accent-soft); }
.stat-val { font-size: 30px; font-weight: 750; letter-spacing: -1px; line-height: 1; }
.stat-sub { font-size: 12px; color: var(--text-3); }

/* ============================================================ PANELS */
.ov-grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 16px; align-items: start; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
.ov-grid .panel + .panel { margin-top: 16px; }
.panel-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.panel-head h4 { font-size: 13.5px; letter-spacing: -.1px; }
.panel-head .sub { font-size: 11.5px; color: var(--text-3); font-family: var(--mono); }
.panel-divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Public IP readout */
.ip-readout { display: flex; flex-direction: column; }
.ip-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
.ip-row + .ip-row { border-top: 1px solid var(--border); }
.ip-meta { font-size: 10.5px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--text-3); margin-bottom: 5px; }
.ip-addr { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
.ip-since { font-size: 11px; color: var(--text-3); text-align: right; font-family: var(--mono); line-height: 1.35; }

/* Reachability */
.reach-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.reach-uptime { display: flex; flex-direction: column; gap: 3px; }
.up-val { font-size: 22px; font-weight: 750; letter-spacing: -.6px; font-family: var(--mono); }
.up-val.down { color: var(--err); }
.up-sub { font-size: 11px; color: var(--text-3); font-family: var(--mono); }
.reach-badge { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 600; padding: 4px 9px; border-radius: var(--r); }
.reach-badge.up { color: var(--ok); background: var(--ok-soft); }
.reach-badge.down { color: var(--err); background: var(--err-soft); }
.rb-dot { width: 7px; height: 7px; background: currentColor; }
.quorum { display: flex; align-items: flex-end; gap: 3px; height: 56px; padding: 0 1px; }
.quorum span { flex: 1; background: var(--accent); align-self: flex-end; min-height: 3px; transition: height var(--tr); }
.quorum span.degraded { background: var(--warn); }
.quorum span.down { background: var(--err); }
.quorum span.live { outline: 1px solid var(--accent); outline-offset: 1px; animation: livepulse 1.6s ease-in-out infinite; }
@keyframes livepulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
.quorum-scale { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); font-family: var(--mono); margin-top: 6px; }
.resolvers { margin-top: 16px; display: flex; flex-direction: column; gap: 9px; }
.res-row { display: grid; grid-template-columns: 128px 1fr 58px; align-items: center; gap: 12px; }
.res-ip { font-family: var(--mono); font-size: 12px; color: var(--text-2); }
.res-track { height: 5px; background: var(--surface-2); border: 1px solid var(--border); overflow: hidden; }
.res-fill { height: 100%; background: var(--accent); transition: width var(--tr); }
.res-fill.slow { background: var(--warn); }
.res-lat { font-family: var(--mono); font-size: 11.5px; color: var(--text-2); text-align: right; }
.res-lat.timeout { color: var(--err); }

/* Record health */
.health-bar { display: flex; height: 12px; gap: 2px; margin-bottom: 14px; }
.health-bar span { min-width: 3px; transition: flex var(--tr); }
.health-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.hl-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.hl-dot { width: 9px; height: 9px; flex: none; }
.hl-label { color: var(--text-2); }
.hl-count { margin-left: auto; font-family: var(--mono); font-weight: 600; color: var(--text); }
.next-check .nc-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
.nc-label { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text-3); }
.nc-time { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
.nc-track { height: 5px; background: var(--surface-2); border: 1px solid var(--border); overflow: hidden; }
.nc-fill { height: 100%; background: var(--accent); transition: width 1s linear; }

/* ============================================================ DOMAINS */
.domain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.domain-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; transition: border-color var(--tr); }
.domain-card:hover { border-color: var(--border-strong); }
.domain-card.updating { border-color: var(--accent); }
.domain-card.disabled { opacity: .62; }
.dc-head { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
.provider-badge { width: 34px; height: 34px; border-radius: var(--r); display: grid; place-items: center; color: #fff; font-family: var(--mono); font-size: 12px; font-weight: 700; flex: none; }
.dc-title { min-width: 0; flex: 1; }
.dc-title .name { font-size: 14px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dc-title .meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; font-size: 12px; color: var(--text-3); }
.rec-type { font-family: var(--mono); font-size: 10.5px; font-weight: 700; color: var(--text-2); background: var(--surface-2); border: 1px solid var(--border); padding: 1px 5px; }
.status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: var(--r); flex: none; }
.status-badge .s-dot { width: 7px; height: 7px; flex: none; background: currentColor; }
.st-synced { color: var(--ok); background: var(--ok-soft); }
.st-pending { color: var(--warn); background: var(--warn-soft); }
.st-error { color: var(--err); background: var(--err-soft); }
.st-updating { color: var(--accent); background: var(--accent-soft); }
.st-paused { color: var(--muted-status); background: var(--muted-soft); }
.st-updating .s-dot { animation: livepulse 1.1s ease-in-out infinite; }
.dc-ip { background: var(--bg-2); border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 14px; }
.ip-label { font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
.ip-val { font-family: var(--mono); font-size: 14px; font-weight: 600; letter-spacing: -.3px; }
.dc-foot { display: flex; align-items: center; justify-content: space-between; }
.dc-updated { font-size: 11.5px; color: var(--text-3); font-family: var(--mono); }
.dc-actions { display: flex; align-items: center; gap: 6px; }
.act-btn { width: 30px; height: 30px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: var(--r); color: var(--text-2); transition: var(--tr); }
.act-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
.act-btn.danger:hover { color: var(--err); border-color: var(--err-soft); background: var(--err-soft); }
.act-btn svg { width: 15px; height: 15px; }

/* ============================================================ SWITCH (square) */
.switch { position: relative; display: inline-block; width: 38px; height: 20px; flex: none; }
.switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
.slider { position: absolute; inset: 0; background: var(--surface-2); border: 1px solid var(--border); transition: var(--tr); }
.slider::before { content: ""; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px; background: var(--text-3); transition: var(--tr); }
.switch input:checked + .slider { background: var(--accent-soft); border-color: var(--accent); }
.switch input:checked + .slider::before { transform: translateX(18px); background: var(--accent); }
.switch input:focus-visible + .slider { outline: 2px solid var(--accent); outline-offset: 1px; }

/* ============================================================ HOOKS */
.hook-list { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.hook-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--surface); transition: background var(--tr); }
.hook-row + .hook-row { border-top: 1px solid var(--border); }
.hook-row:hover { background: var(--surface-2); }
.hook-ico { width: 34px; height: 34px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: var(--r); color: var(--indigo); flex: none; }
.hook-ico svg { width: 17px; height: 17px; }
.hook-main { flex: 1; min-width: 0; }
.hook-name { font-size: 14px; font-weight: 650; }
.hook-events { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.evt-tag { font-family: var(--mono); font-size: 11px; color: var(--text-2); background: var(--bg-2); border: 1px solid var(--border); padding: 1px 7px; }
.hook-actions { display: flex; gap: 6px; }

/* ============================================================ LOGS */
.log-toolbar { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.log-search { flex: 1; min-width: 220px; display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 0 12px; transition: var(--tr); }
.log-search:focus-within { border-color: var(--accent); }
.log-search svg { width: 15px; height: 15px; color: var(--text-3); flex: none; }
.log-search input { flex: 1; background: none; border: none; outline: none; color: var(--text); padding: 9px 0; }
.filter-group { display: flex; gap: 2px; background: var(--border); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.filter-chip { padding: 8px 14px; font-size: 12.5px; font-weight: 600; color: var(--text-2); background: var(--surface); transition: var(--tr); }
.filter-chip:hover { color: var(--text); }
.filter-chip.active { color: #fff; background: var(--accent); }
.log-viewer { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r); height: 60vh; min-height: 340px; overflow-y: auto; padding: 8px 0; font-family: var(--mono); font-size: 12.5px; }
.log-empty { padding: 40px; text-align: center; color: var(--text-3); }
.log-line { display: grid; grid-template-columns: 92px 62px 1fr; gap: 12px; padding: 3px 16px; align-items: baseline; }
.log-line:hover { background: var(--surface); }
.log-time { color: var(--text-3); }
.log-level { font-weight: 700; font-size: 10.5px; letter-spacing: .5px; }
.log-level-INFO { color: var(--accent); }
.log-level-WARNING { color: var(--warn); }
.log-level-ERROR { color: var(--err); }
.log-msg { color: var(--text); word-break: break-word; }

/* ============================================================ SETTINGS */
.settings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
.about-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; align-items: start; margin-top: 16px; }
.sg-title { font-size: 11px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.sr-text { display: flex; flex-direction: column; gap: 2px; }
.sr-text .t { font-size: 13.5px; font-weight: 600; }
.sr-text .d { font-size: 12px; color: var(--text-3); }
.chips { display: flex; gap: 2px; background: var(--border); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.chip { flex: 1; padding: 9px 6px; font-size: 12.5px; font-weight: 600; color: var(--text-2); background: var(--surface); transition: var(--tr); text-align: center; }
.chip:hover { color: var(--text); }
.chip.active { color: #fff; background: var(--accent); }
.switch-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 0; }
.switch-row + .switch-row { border-top: 1px solid var(--border); }
.field { display: flex; flex-direction: column; gap: 7px; }
.field label { font-size: 12.5px; font-weight: 600; }
.field label .hint, .field .hint { font-weight: 400; color: var(--text-3); }

.cs-option {

}
.cs-option:hover, .cs-option.active { background: var(--surface-2); color: var(--text); }

.toasts { position: fixed; bottom: 20px; right: 20px; z-index: var(--z-toast); display: flex; flex-direction: column; gap: 8px; max-width: 340px; }
.toast { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r); padding: 11px 13px; font-size: 13px; animation: toastin .16s ease-out; }

/* Styled combobox — mirrors the app's <Select>. A visually-hidden native <select>

function makeSelect(host, opts) {
  const { options, value, onChange, ariaLabel, id } = opts;
  let cur = value != null ? value : (options[0] && options[0].value);
  host.classList.add('cs');
  host.innerHTML = '';
  const nat = el('select', 'cs-native');
  if (id) nat.id = id;
  if (ariaLabel) nat.setAttribute('aria-label', ariaLabel);
  nat.tabIndex = -1;
  nat.innerHTML = options.map(o => `<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('');

  trigger.type = 'button'; trigger.setAttribute('aria-hidden', 'true'); trigger.tabIndex = -1;

    menu.innerHTML = options.map(o => `<button type="button" class="cs-option${o.value===cur?' sel':''}" data-v="${esc(o.value)}"><span>${esc(o.label)}</span>${svg('<path d="m5 12 5 5L20 7"/>', 2.5).replace('<svg','<svg class="cs-check"')}</button>`).join('');

function viewOverview(root) {
  const total = state.domains.length;
  const providers = new Set(state.domains.map(d => d.provider)).size;
  let synced = 0, needs = 0;
  state.domains.forEach(d => { if (d.status === 'synced') synced++; if (d.status === 'pending' || d.status === 'error') needs++; });

  const stats = el('div', 'stats');
  const stat = (label, val, sub, tint, ico) => `<div class="stat"><div class="stat-top"><span class="stat-label">${label}</span><span class="stat-ico ${tint}">${svg(ico)}</span></div><div class="stat-val">${val}</div><div class="stat-sub">${sub}</div></div>`;
  stats.innerHTML =
    stat('Total Domains', total, `Across ${providers} provider${providers===1?'':'s'}`, 'tint-accent', IC.domains) +
    stat('Synced', synced, 'Records up to date', 'tint-ok', '<path d="M20 6 9 17l-5-5"/>') +
    stat('Needs Update', needs, 'Pending or errored', needs > 0 ? 'tint-warn' : 'tint-ok', '<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/>') +
    stat('Update Interval', fmtInterval(state.check_interval), 'Check for IP changes', 'tint-accent', '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>');
  root.appendChild(stats);

  const grid = el('div', 'ov-grid');
  const left = el('div');
  left.appendChild(ipPanel());
  const reachWrap = el('div', 'panel'); reachWrap.style.marginTop = '16px'; reachWrap.appendChild(reachContent()); left.appendChild(reachWrap);
  grid.appendChild(left);
  grid.appendChild(healthPanel());
  root.appendChild(grid);
}

function ipPanel() {
  const p = el('div', 'panel');
  const rows = [
    { meta: 'IPv4 · A', addr: state.public_ipv4, since: state.ipv4_changed_at },
    { meta: 'IPv6 · AAAA', addr: state.public_ipv6, since: state.ipv6_changed_at },
  ];
  p.innerHTML = `<div class="panel-head"><h4>Public IP</h4><span class="sub">dual-stack · ${state.check_interval ? IP_SOURCES.find(s=>s.key==='icanhazip').display_name : ''}</span></div>
  <div class="ip-readout">${rows.map(r => `<div class="ip-row"><div><div class="ip-meta">${r.meta}</div><div class="ip-addr">${r.addr || '—'}</div></div><div class="ip-since">stable<br>${relStable(r.since)}</div></div>`).join('')}</div>`;
  return p;
}

function reachContent() {
  const r = state.reachability;
  const frag = document.createDocumentFragment();
  const bars = r.history.slice(-24);
  const last = bars[bars.length - 1];
  const online = last ? last.successes >= 2 : true;
  const pct = r.checks ? ((r.online / r.checks) * 100).toFixed(1) + '%' : '—';
  const head = el('div');
  head.innerHTML = `<div class="panel-head"><h4>Reachability</h4><span class="sub">quorum 2 of 4</span></div>
  <div class="reach-head"><div class="reach-uptime"><span class="up-val${online?'':' down'}">${pct}</span><span class="up-sub">${r.online}/${r.checks} checks · up ${fmtUptime(r.started_at)}</span></div><span class="reach-badge ${online?'up':'down'}"><span class="rb-dot"></span>${online?'Online':'Offline'}</span></div>`;
  frag.appendChild(head);
  const q = el('div', 'quorum');
  bars.forEach((h, i) => {
    const cls = h.successes < 2 ? 'down' : (h.successes < h.total ? 'degraded' : '');
    const live = i === bars.length - 1 ? ' live' : '';
    const s = el('span', (cls + live).trim());
    s.style.height = Math.max(14, Math.round((h.successes / h.total) * 100)) + '%';
    s.title = `${h.successes}/${h.total} ok`;
    q.appendChild(s);
  });
  frag.appendChild(q);
  frag.appendChild(el('div', 'quorum-scale', '<span>24 checks ago</span><span>now</span>'));
  const res = el('div', 'resolvers');
  r.latest.forEach(x => {
    if (!x.ok || x.latency_ms == null) {
      res.innerHTML += `<div class="res-row"><span class="res-ip">${x.ip}</span><div class="res-track"><div class="res-fill" style="width:0%"></div></div><span class="res-lat timeout">timeout</span></div>`;
    } else {
      const w = Math.min(100, (x.latency_ms / 120) * 100);
      const slow = x.latency_ms > 80 ? ' slow' : '';
      res.innerHTML += `<div class="res-row"><span class="res-ip">${x.ip}</span><div class="res-track"><div class="res-fill${slow}" style="width:${w}%"></div></div><span class="res-lat">${Math.round(x.latency_ms)} ms</span></div>`;
    }
  });
  frag.appendChild(res);
  return frag;
}

function healthPanel() {
  const ORDER = [['synced','Synced','var(--ok)'],['pending','Pending','var(--warn)'],['error','Error','var(--err)'],['paused','Paused','var(--muted-status)']];
  const counts = { synced:0, pending:0, error:0, paused:0 };
  state.domains.forEach(d => { let s = !d.enabled ? 'paused' : d.status; if (s === 'updating') s = 'pending'; counts[s in counts ? s : 'pending']++; });
  const n = state.domains.length;
  const segs = ORDER.filter(([k]) => counts[k] > 0);
  const remain = state.next_check_at == null ? 0 : Math.max(0, state.next_check_at - NOW());
  const fill = state.check_interval ? Math.min(100, (remain / state.check_interval) * 100) : 0;
  const p = el('div', 'panel');
  p.innerHTML = `<div class="panel-head"><h4>Record health</h4><span class="sub">${n} domain${n===1?'':'s'}</span></div>
    <div class="health-bar">${segs.length ? segs.map(([k,,c]) => `<span style="flex:${counts[k]};background:${c}" title="${counts[k]} ${k}"></span>`).join('') : '<span style="flex:1;background:var(--surface-2)"></span>'}</div>
    <div class="health-legend">${ORDER.map(([k,label,c]) => `<div class="hl-item"><span class="hl-dot" style="background:${c}"></span><span class="hl-label">${label}</span><span class="hl-count">${counts[k]}</span></div>`).join('')}</div>
    <div class="panel-divider"></div>
    <div class="next-check"><div class="nc-top"><span class="nc-label">Next check</span><span class="nc-time" id="ncTime">${fmtCountdown(state.next_check_at)}</span></div><div class="nc-track"><div class="nc-fill" id="ncFill" style="width:${fill}%"></div></div></div>`;
  return p;
}

let logFilter = { q: '', level: 'ALL' };
function viewLogs(root) {
  const filtered = state.logs.filter(l => (logFilter.level === 'ALL' || l.level === logFilter.level) && (!logFilter.q || l.message.toLowerCase().includes(logFilter.q.toLowerCase())));
  const head = el('div', 'section-head');
  head.innerHTML = `<h3>Logs</h3><span class="count-badge" id="logCount">${filtered.length}</span>`;
  root.appendChild(head);
  const bar = el('div', 'log-toolbar');
  bar.innerHTML = `<div class="log-search">${svg('<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>')}<input type="text" id="logSearch" placeholder="Filter log messages…" value="${esc(logFilter.q)}"></div>
    <div class="filter-group">${['ALL','INFO','WARNING','ERROR'].map(lv => `<button class="filter-chip${logFilter.level===lv?' active':''}" data-lv="${lv}">${({ALL:'All',INFO:'Info',WARNING:'Warn',ERROR:'Error'})[lv]}</button>`).join('')}</div>`;
  root.appendChild(bar);
  const viewer = el('div', 'log-viewer'); viewer.id = 'logViewer';
  renderLogLines(viewer, filtered);
  root.appendChild(viewer);
  viewer.scrollTop = viewer.scrollHeight;

  bar.querySelector('#logSearch').oninput = (e) => { logFilter.q = e.target.value; refreshLogs(); };
  bar.querySelectorAll('.filter-chip').forEach(c => c.onclick = () => { logFilter.level = c.dataset.lv; viewLogs(root.replaceChildren() || root); });
}
function renderLogLines(viewer, logs) {
  viewer.innerHTML = logs.length ? logs.map(l => `<div class="log-line"><span class="log-time">${new Date(l.time*1000).toLocaleTimeString()}</span><span class="log-level log-level-${l.level}">${l.level}</span><span class="log-msg">${esc(l.message)}</span></div>`).join('') : '<div class="log-empty">No matching log records.</div>';
}
function refreshLogs() {
  if (state.view !== 'logs') return;
  const filtered = state.logs.filter(l => (logFilter.level === 'ALL' || l.level === logFilter.level) && (!logFilter.q || l.message.toLowerCase().includes(logFilter.q.toLowerCase())));
  const viewer = $('#logViewer'); if (!viewer) return;
  const atBottom = viewer.scrollHeight - viewer.scrollTop - viewer.clientHeight < 40;
  renderLogLines(viewer, filtered);
  $('#logCount').textContent = filtered.length;
  if (atBottom) viewer.scrollTop = viewer.scrollHeight;
}

/* ============================================================ ACTIONS */
let dmProviderSel = null, dmTypeSel = null;
function toggleDomain(id) {
  const d = state.domains.find(x => x.id === id); if (!d) return;
  d.enabled = !d.enabled;
  toast(d.hostname + (d.enabled ? ' enabled' : ' disabled'), 'info');
  pushLog('INFO', d.hostname + ' auto-update ' + (d.enabled ? 'enabled' : 'disabled'));
  if (state.view === 'domains') setView('domains');
  if (state.view === 'overview') setView('overview');
}
function syncDomain(id) {
  const d = state.domains.find(x => x.id === id); if (!d || d.status === 'updating') return;
  const prev = d.status;
  d.status = 'updating';
  pushLog('INFO', 'Forcing update for ' + d.hostname + ' (' + d.record_type + ')');
  if (state.view === 'domains') setView('domains');
  setTimeout(() => {
    if (prev === 'error') { d.status = 'error'; toast('Sync failed for ' + d.hostname, 'err', true); pushLog('ERROR', d.hostname + ' update failed: token rejected (HTTP 401)'); }
    else { d.status = 'synced'; d.ip = d.record_type === 'AAAA' ? state.public_ipv6 : state.public_ipv4; d.updated = NOW(); toast(d.hostname + ' synced', 'ok'); pushLog('INFO', d.hostname + ' updated → ' + d.ip); }
    if (state.view === 'domains') setView('domains');
    if (state.view === 'overview') setView('overview');
  }, 1600);
}
function openDomainModal(d) {
  const m = $('#domainModal');
  $('#dmTitle').textContent = d ? 'Edit Domain' : 'Add Domain';
  $('#dmSave').textContent = d ? 'Save Changes' : 'Add Domain';
  $('#dmHost').value = d ? d.hostname : '';
  $('#dmHost').style.borderColor = '';
  $('#dmEnabled').checked = d ? d.enabled : true;
  const updateBlurb = (prov) => { $('#dmBlurb').textContent = PROVIDERS.find(p => p.key === prov)?.blurb || ''; };
  dmProviderSel = makeSelect($('#dmProvider'), {
    id: 'dmProviderNative', ariaLabel: 'DNS Provider',
    options: PROVIDERS.map(p => ({ value: p.key, label: p.display_name })),
    value: d ? d.provider : PROVIDERS[0].key,
    onChange: updateBlurb,
  });
  dmTypeSel = makeSelect($('#dmType'), {
    id: 'dmTypeNative', ariaLabel: 'Record Type',
    options: [{ value: 'A', label: 'A (IPv4)' }, { value: 'AAAA', label: 'AAAA (IPv6)' }],
    value: d ? d.record_type : 'A',
  });
  updateBlurb(dmProviderSel.getValue());
  m.dataset.editing = d ? d.id : '';
  m.classList.add('open');
  setTimeout(() => $('#dmHost').focus(), 30);
}
$('#dmSave').onclick = () => {
  const m = $('#domainModal');
  const host = $('#dmHost').value.trim();
  if (!host) { $('#dmHost').focus(); $('#dmHost').style.borderColor = 'var(--err)'; return; }
  const editing = m.dataset.editing;
  const payload = { hostname: host, provider: dmProviderSel.getValue(), record_type: dmTypeSel.getValue(), enabled: $('#dmEnabled').checked };
  if (editing) {
    const d = state.domains.find(x => x.id === editing);
    Object.assign(d, payload); toast(host + ' updated', 'ok'); pushLog('INFO', 'Domain ' + host + ' updated');
  } else {
    state.domains.push({ id: 'd' + Date.now(), ...payload, status: 'pending', ip: null, updated: null, provider_config: {} });
    toast(host + ' added', 'ok'); pushLog('INFO', 'Domain ' + host + ' added (' + payload.record_type + ' via ' + providerName(payload.provider) + ')');
  }
  m.classList.remove('open');
  setView('domains');
};

let confirmCtx = null;
function confirmDelete(kind, id, name) {
  confirmCtx = { kind, id };
  $('#cfTitle').textContent = 'Delete ' + kind;
  $('#cfBody').innerHTML = `Delete <strong>${esc(name)}</strong>? This can't be undone.`;
  $('#confirmModal').classList.add('open');
}
$('#cfConfirm').onclick = () => {
  if (!confirmCtx) return;
  if (confirmCtx.kind === 'domain') { const d = state.domains.find(x=>x.id===confirmCtx.id); state.domains = state.domains.filter(x => x.id !== confirmCtx.id); toast((d?d.hostname:'Domain') + ' deleted', 'warn'); pushLog('WARNING', 'Domain ' + (d?d.hostname:confirmCtx.id) + ' removed'); }
  else { state.hooks = state.hooks.filter(x => x.id !== confirmCtx.id); toast('Hook deleted', 'warn'); }
  $('#confirmModal').classList.remove('open');
  setView(state.view);
  confirmCtx = null;
};

/* ============================================================ TOASTS + LOG STREAM */
function toast(msg, kind, withLink) {
  const t = el('div', 'toast ' + (kind || 'info'));
  t.innerHTML = `<span class="tdot"></span><span class="tmsg">${esc(msg)}${withLink ? ' — <a data-golog>View in Logs</a>' : ''}</span>`;
  $('#toasts').appendChild(t);
  if (withLink) t.querySelector('[data-golog]').onclick = () => { logFilter.level = 'ERROR'; setView('logs'); t.remove(); };
  setTimeout(() => { t.style.transition = 'opacity .2s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, withLink ? 6000 : 3200);
}
function pushLog(level, message) {
  state.logs.push({ time: NOW(), level, logger: 'tether', message });
  if (state.logs.length > 400) state.logs.shift();
  refreshLogs();
}

/* ============================================================ CONTROLS */
function setTheme(t) {
  state.theme = t;
  document.documentElement.setAttribute('data-theme', t);
  $('#themeIcon').outerHTML = t === 'dark'
    ? '<svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2m-3-7-1.5 1.5M6.5 17.5 5 19m14 0-1.5-1.5M6.5 6.5 5 5"/></svg>'
    : '<svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}
$('#themeToggle').onclick = () => setTheme(state.theme === 'dark' ? 'light' : 'dark');
$('#refreshBtn').onclick = (e) => {
  const b = e.currentTarget; b.classList.add('spin');
  pushLog('INFO', 'Manual refresh requested');
  setTimeout(() => { b.classList.remove('spin'); toast('State refreshed', 'ok'); if (['overview','domains'].includes(state.view)) setView(state.view); }, 800);
};
$('#railToggle').onclick = () => document.documentElement.classList.toggle('rail-open');
$('#railScrim').onclick = () => document.documentElement.classList.remove('rail-open');
document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => b.closest('.modal-overlay').classList.remove('open'));
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); }));
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(o => o.classList.remove('open')); });

/* ============================================================ LIVE TICKS */
// countdown + rescheduling + occasional simulated activity
setInterval(() => {
  // countdown
  if (state.next_check_at != null) {
    const t = $('#ncTime'), f = $('#ncFill');
    if (t) t.textContent = fmtCountdown(state.next_check_at);
    if (f) { const remain = Math.max(0, state.next_check_at - NOW()); f.style.width = (state.check_interval ? Math.min(100, remain/state.check_interval*100) : 0) + '%'; }
    if (state.next_check_at - NOW() <= 0) {
      state.next_check_at = NOW() + state.check_interval;
      // roll a new reachability check
      const h = state.reachability.history;
      const successes = Math.random() < 0.1 ? 3 : 4;
      h.push({ ts: NOW(), successes, total: 4 }); if (h.length > 24) h.shift();
      state.reachability.checks++; if (successes >= 2) state.reachability.online++;
      pushLog('INFO', 'Scheduled check complete: quorum ' + successes + '/4, public IP unchanged');
      if (state.view === 'overview') setView('overview');
    }
  }
}, 1000);

/* ============================================================ BOOT */
renderNav(); renderTopbar(); renderView(); setTheme('dark');
</script>
</body>
</html>
